plugins {
    id 'java'
}

group = findProperty('group')
version = findProperty('version')

def buildConstantsJavaDir = layout.buildDirectory.dir('generated/sources/buildconstants/java')

tasks.register('generateBuildConstants') {
    inputs.property('version', project.version)
    outputs.dir(buildConstantsJavaDir)

    doLast {
        def dir = buildConstantsJavaDir.get().asFile
        def pkg = new File(dir, 'aedifi/votelistener')
        pkg.mkdirs()
        def v = project.version.toString().replace('\\', '\\\\').replace('"', '\\"')
        new File(pkg, 'BuildConstants.java').text = """package aedifi.votelistener;

/**
 * Generated by Gradle from {@code project.version} — do not edit.
 */
public final class BuildConstants {
    public static final String VERSION = \"${v}\";

    private BuildConstants() {
    }
}
"""
    }
}

sourceSets {
    main {
        java {
            srcDir(buildConstantsJavaDir)
        }
    }
}

tasks.named('compileJava') {
    dependsOn('generateBuildConstants')
}

repositories {
    mavenCentral()
    maven { url = 'https://repo.papermc.io/repository/maven-public/' }
}

dependencies {
    compileOnly 'com.velocitypowered:velocity-api:3.4.0-SNAPSHOT'
    annotationProcessor 'com.velocitypowered:velocity-api:3.4.0-SNAPSHOT'
    implementation 'org.yaml:snakeyaml:2.4'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}
